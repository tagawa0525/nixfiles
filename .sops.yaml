# =============================================================================
# sops-nix 暗号化設定
# =============================================================================
# シークレットファイルの暗号化に使用する公開鍵を定義します。
# 各ホストの公開鍵は以下のコマンドで取得:
#   nix-shell -p age --run "age-keygen -y /etc/sops/age/keys.txt"
# =============================================================================
keys:
  - &r995 age1c249tjdgdek674mv7sgzkdgf83fyns8cdskj97lc2397uczfcafss42lna

creation_rules:
  - path_regex: secrets/r995\.yaml$
    key_groups:
      - age:
          - *r995
